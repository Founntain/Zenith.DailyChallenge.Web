<header class="modern-header">
  <div class="header-container">
    <!-- Logo/Icon Section -->
    <div class="logo-section clickable" [routerLink]="['']">
      <div class="logo-icon">
        <mat-icon>dark_mode</mat-icon>
      </div>
      <span class="logo-text">
        <a>Zenith<br/>Daily<br/>Challenge</a>
      </span>
    </div>

    <nav class="nav-items">
      <a [routerLink]="['/']" class="nav-link">Home</a>
      <a [routerLink]="['/daily-archive']" class="nav-link">Challenges</a>
      <a [routerLink]="['/cc']" [class]="['nav-link', this.communityCss]">Community</a>
      <a [routerLink]="['/leaderboard']" class="nav-link">Leaderboards</a>
<!--      <a [routerLink]="['/seasonal']" class="nav-link">Seasons</a>-->
      <a [routerLink]="['/create']" class="nav-link announcement">Create</a>
    </nav>

    <div class="header-actions">
<!--      <button class="icon-btn search-btn" aria-label="Search">-->
<!--        <mat-icon>search</mat-icon>-->
<!--      </button>-->

      @if (user$ | async; as user) {
        <div class="user-profile clickable">
            <img
              [routerLink]="['/u', user.username]"
              class="profile-avatar"
              [src]="'https://tetr.io/user-content/avatars/' + user.userId + '.jpg'"
              [alt]="user.username"
              (error)="onImageError($event)"
            />
          <span class="username uppercase" [routerLink]="['/u', user.username]">{{ user.username }}</span>
          <mat-icon class="logout-icon" (click)="logout()">logout</mat-icon>
        </div>
      } @else {
        <button class="primary-button" (click)="loginClick()">
          <span>Sign In</span>
          <mat-icon>login</mat-icon>
        </button>
      }

      <button class="icon-btn mobile-menu-btn" (click)="drawer.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
    </div>
  </div>
</header>
